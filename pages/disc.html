<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aurum — Les questions</title>
  <link rel="icon" type="image/png" href="../assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="../assets/img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: "#FAF9F7",
            ink: "#101418",
            mute: "#5E6673",
            primary: "#0A2240",
            accent: "#E1C56A"
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            serif: ["Playfair Display", "serif"]
          },
          boxShadow: {
            soft: "0 20px 40px rgba(0,0,0,.06)"
          }
        }
      }
    }
  </script>
  <style>
    body { background: #FAF9F7; color:#101418; }
    .muted { color:#5E6673; }
  </style>
</head>
<body class="font-sans antialiased">
  <main class="min-h-screen flex flex-col">
    <header class="px-5 pt-6 flex items-center justify-between">
      <a href="./onboarding.html" class="inline-flex items-center gap-2 text-sm text-primary opacity-80 hover:opacity-100">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8l8 8l1.41-1.41L7.83 13H20z"/></svg>
        Revenir
      </a>
      <span id="statusBar" class="text-sm px-4 py-2 rounded-full bg-white border border-black/10 shadow-sm">État : disponible</span>
    </header>

    <section class="flex-1 flex items-center pb-12">
      <div class="w-full max-w-3xl mx-auto px-5">
        <div class="text-center mt-6 mb-8">
          <p class="text-sm uppercase tracking-[0.2em] text-mute">Parcours introspectif</p>
          <h1 class="font-serif text-3xl sm:text-4xl">Observer ce qui se déploie</h1>
          <p class="muted mt-3">24 situations courtes + une phrase libre. Tu peux faire des pauses, tout est enregistré localement.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-soft px-6 py-8 space-y-6">
          <div class="flex items-center justify-between">
            <p class="text-sm font-semibold">Question <span id="progressCurrent">1</span>/<span id="progressTotal">24</span></p>
            <button id="resetBtn" class="text-xs text-primary underline decoration-dotted">Recommencer</button>
          </div>

          <div id="questionContainer" class="space-y-4">
            <p id="questionPrompt" class="text-lg font-semibold"></p>
            <div id="optionsGrid" class="grid gap-3"></div>
          </div>

          <div id="freeTextContainer" class="space-y-3 hidden">
            <p class="text-lg font-semibold"></p>
            <textarea id="freeTextInput" rows="4" class="w-full rounded-xl border border-black/10 px-4 py-3 focus:ring-0 focus:border-black/30" placeholder=""></textarea>
            <button id="freeTextSave" class="h-11 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90">Enregistrer</button>
          </div>

          <div class="flex justify-between text-sm text-mute">
            <span id="resumeHint">Tu peux quitter et revenir quand tu veux.</span>
            <span id="answersCount">0 réponse</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="../js/discEngine.js"></script>
</body>
</html>
