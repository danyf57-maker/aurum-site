<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aurum — Portrait</title>
  <link rel="icon" type="image/png" href="../assets/img/favicon.png" />
  <link rel="apple-touch-icon" href="../assets/img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: "#FAF9F7",
            ink: "#101418",
            mute: "#5E6673",
            primary: "#0A2240",
            accent: "#E1C56A"
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            serif: ["Playfair Display", "serif"]
          },
          boxShadow: {
            soft: "0 20px 40px rgba(0,0,0,.06)"
          }
        }
      }
    }
  </script>
  <style>
    body { background: #FAF9F7; color:#101418; }
    .muted { color:#5E6673; }
  </style>
</head>
<body class="font-sans antialiased">
  <main class="min-h-screen flex flex-col">
    <header class="px-5 pt-6 flex items-center justify-between">
      <a href="./disc.html" class="inline-flex items-center gap-2 text-sm text-primary opacity-80 hover:opacity-100">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8l8 8l1.41-1.41L7.83 13H20z"/></svg>
        Revenir aux questions
      </a>
      <span id="statusBar" class="text-sm px-4 py-2 rounded-full bg-white border border-black/10 shadow-sm">État : disponible</span>
    </header>

    <section class="flex-1">
      <div class="max-w-4xl mx-auto px-5 py-10 space-y-8">
        <div class="text-center">
          <p class="text-sm uppercase tracking-[0.2em] text-mute">Portrait intérieur</p>
          <h1 class="font-serif text-3xl sm:text-4xl mt-2">Une dynamique se dessine</h1>
          <p class="muted mt-3" id="profileSubtitle">Un angle de vue, pas une étiquette. Vous pouvez y revenir, l’oublier, ou le compléter selon ce qui résonne.</p>
        </div>

        <div id="profileHighlight" class="rounded-2xl bg-white shadow-soft border border-black/5 p-5 space-y-2">
          <p class="text-sm uppercase tracking-[0.2em] text-mute" id="profileTitle"></p>
          <p class="text-sm muted" id="profilePair"></p>
          <p class="text-xs muted" id="profileGenerated"></p>
        </div>

        <div class="grid gap-5 lg:grid-cols-2" id="profileSections">
          <!-- Sections injected -->
        </div>

        <div class="flex flex-col sm:flex-row gap-3 pt-4">
          <a href="./coaching.html" class="inline-flex items-center justify-center h-12 rounded-xl bg-primary text-white font-semibold hover:bg-primary/90 flex-1 text-center">Découvrir des pistes pour avancer</a>
          <a href="./disc.html" class="inline-flex items-center justify-center h-12 rounded-xl border border-black/15 text-primary font-semibold flex-1 text-center">Revenir aux questions</a>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="../js/synthesis.js"></script>
</body>
</html>
