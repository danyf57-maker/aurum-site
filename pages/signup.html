<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aurum — Entrer</title>

  <!-- Tailwind inline (comme Stitch) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#0A2240",      // Night Blue
            "accent": "#E1C56A",       // Soft Gold
            "background": "#FAF9F7",   // Cream background
            "text-dark": "#1A1A1A",
            "text-soft": "#6F7287",
          },
          fontFamily: {
            serif: ["Playfair Display", "serif"],
            sans: ["Inter", "sans-serif"]
          },
          borderRadius: {
            lg: "0.75rem"
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet"/>
</head>

<body class="bg-background text-text-dark flex items-center justify-center min-h-screen p-6">

  <div class="w-full max-w-md bg-white shadow-lg rounded-xl p-8 border border-gray-100">
    
    <!-- Logo -->
    <div class="flex items-center justify-center mb-6">
      <div class="w-8 h-8 rounded-full bg-accent/30 flex items-center justify-center">
        <span class="text-accent text-xl">✦</span>
      </div>
    </div>

    <!-- Titre -->
    <h1 class="text-3xl font-serif text-center mb-2">Bienvenue</h1>
    <p class="text-center text-text-soft text-sm mb-8">
      Un espace pour revenir à soi, à votre rythme.
    </p>

    <!-- Navigation Login / Sign up -->
    <div class="flex mb-8 border-b border-gray-200">
      <button id="tab-login" class="flex-1 pb-2 text-center font-medium text-primary border-b-2 border-primary">
        Se connecter
      </button>

      <button id="tab-signup" class="flex-1 pb-2 text-center font-medium text-text-soft">
        Créer un compte
      </button>
    </div>

    <!-- Form Login -->
    <form id="login-form" class="space-y-5">
      <div>
        <label class="block text-sm mb-1">Email</label>
        <input type="email" class="w-full border border-gray-300 rounded-lg p-3" required>
      </div>

      <div>
        <label class="block text-sm mb-1">Mot de passe</label>
        <input type="password" class="w-full border border-gray-300 rounded-lg p-3" required>
      </div>

      <button class="w-full bg-primary text-white rounded-lg p-3 font-medium">
        Entrer
      </button>
    </form>

    <!-- Form Sign up -->
    <form id="signup-form" class="space-y-5 hidden">
      <div>
        <label class="block text-sm mb-1">Votre prénom</label>
        <input type="text" class="w-full border border-gray-300 rounded-lg p-3" required>
      </div>

      <div>
        <label class="block text-sm mb-1">Email</label>
        <input type="email" class="w-full border border-gray-300 rounded-lg p-3" required>
      </div>

      <div>
        <label class="block text-sm mb-1">Mot de passe</label>
        <input type="password" class="w-full border border-gray-300 rounded-lg p-3" required>
      </div>

      <button class="w-full bg-primary text-white rounded-lg p-3 font-medium">
        Créer le compte
      </button>
    </form>

  </div>

  <script>
    const tabLogin = document.getElementById("tab-login");
    const tabSignup = document.getElementById("tab-signup");
    const formLogin = document.getElementById("login-form");
    const formSignup = document.getElementById("signup-form");

    tabSignup.addEventListener("click", () => {
      tabLogin.classList.remove("text-primary", "border-primary", "border-b-2");
      tabLogin.classList.add("text-text-soft");

      tabSignup.classList.add("text-primary", "border-primary", "border-b-2");
      tabSignup.classList.remove("text-text-soft");

      formLogin.classList.add("hidden");
      formSignup.classList.remove("hidden");
    });

    tabLogin.addEventListener("click", () => {
      tabSignup.classList.remove("text-primary", "border-primary", "border-b-2");
      tabSignup.classList.add("text-text-soft");

      tabLogin.classList.add("text-primary", "border-primary", "border-b-2");
      tabLogin.classList.remove("text-text-soft");

      formSignup.classList.add("hidden");
      formLogin.classList.remove("hidden");
    });
  </script>

</body>
</html>
